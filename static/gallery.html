<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Gallery | ProjectPlutonium</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />
    <style>
      .thumbnail-card { min-height: 320px; }
      .thumbnail-img { width: 100%; height: 180px; object-fit: cover; }
      .thumbnail-placeholder { height: 180px; display: flex; align-items: center; justify-content: center; font-size: 4rem; color: #6c757d; background: #f8f9fa; }
    </style>
  </head>
  <body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
      <div class="container-fluid">
        <a class="navbar-brand" href="/">ProjectPlutonium</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
          <ul class="navbar-nav ms-auto">
            <li class="nav-item"><a class="nav-link" href="/">Home</a></li>
            <li class="nav-item"><a class="nav-link active" href="/gallery">Gallery</a></li>
            <li class="nav-item"><a class="nav-link" href="/admin">Admin</a></li>
          </ul>
        </div>
      </div>
    </nav>

    <main class="container my-5">
      <div class="mb-4 d-flex align-items-center justify-content-between">
        <div>
          <h1 class="h3">Uploaded Object Gallery</h1>
          <p class="text-muted mb-0">Browse every uploaded item in a responsive thumbnail grid.</p>
        </div>
        <button id="refreshButton" class="btn btn-outline-primary">Refresh</button>
      </div>

      <div id="galleryMessage" class="alert alert-info">Loading gallery...</div>
      <div id="galleryGrid" class="row row-cols-1 row-cols-sm-2 row-cols-md-3 g-4"></div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script>
      const galleryGrid = document.getElementById('galleryGrid');
      const galleryMessage = document.getElementById('galleryMessage');
      const refreshButton = document.getElementById('refreshButton');

      function createCard(item) {
        const col = document.createElement('div');
        col.className = 'col';
        const card = document.createElement('div');
        card.className = 'card thumbnail-card shadow-sm';

        const imageWrapper = document.createElement('div');
        imageWrapper.className = 'overflow-hidden';

        if (item.content_type && item.content_type.startsWith('image/')) {
          const img = document.createElement('img');
          img.src = item.download_url;
          img.alt = item.filename;
          img.className = 'thumbnail-img';
          imageWrapper.appendChild(img);
        } else {
          const placeholder = document.createElement('div');
          placeholder.className = 'thumbnail-placeholder';
          placeholder.textContent = '📄';
          imageWrapper.appendChild(placeholder);
        }

        const body = document.createElement('div');
        body.className = 'card-body d-flex flex-column';

        const title = document.createElement('h6');
        title.className = 'card-title mb-2 text-truncate';
        title.textContent = item.filename;

        const meta = document.createElement('p');
        meta.className = 'card-text mb-2 small text-muted';
        meta.innerHTML = `Type: <strong>${item.content_type || 'unknown'}</strong><br>Size: <strong>${item.content_size}</strong> bytes`;

        const footer = document.createElement('div');
        footer.className = 'mt-auto d-flex justify-content-between align-items-center';

        const status = document.createElement('span');
        status.className = 'badge bg-secondary';
        status.textContent = item.scan_result || 'pending';

        const link = document.createElement('a');
        link.href = item.download_url;
        link.target = '_blank';
        link.rel = 'noreferrer noopener';
        link.className = 'btn btn-sm btn-outline-primary';
        link.textContent = 'Open';

        footer.appendChild(status);
        footer.appendChild(link);
        body.appendChild(title);
        body.appendChild(meta);
        body.appendChild(footer);
        card.appendChild(imageWrapper);
        card.appendChild(body);
        col.appendChild(card);
        return col;
      }

      async function loadGallery() {
        galleryGrid.innerHTML = '';
        galleryMessage.className = 'alert alert-info';
        galleryMessage.textContent = 'Loading gallery...';
        try {
          const resp = await fetch('/objects');
          if (!resp.ok) throw new Error(`Failed to load gallery (${resp.status})`);
          const items = await resp.json();
          if (!items.length) {
            galleryMessage.className = 'alert alert-warning';
            galleryMessage.textContent = 'No uploaded items yet.';
            return;
          }
          galleryMessage.className = 'alert alert-success';
          galleryMessage.textContent = `${items.length} item(s) uploaded.`;
          items.forEach((item) => galleryGrid.appendChild(createCard(item)));
        } catch (error) {
          galleryMessage.className = 'alert alert-danger';
          galleryMessage.textContent = error.message;
        }
      }

      refreshButton.addEventListener('click', loadGallery);
      loadGallery();
    </script>
  </body>
</html>
