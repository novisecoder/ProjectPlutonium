<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Admin Dashboard | ProjectPlutonium</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />
  </head>
  <body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
      <div class="container-fluid">
        <a class="navbar-brand" href="/">ProjectPlutonium</a>
        <div class="d-flex">
          <button id="logoutButton" class="btn btn-outline-light btn-sm me-2">Logout</button>
          <a class="btn btn-outline-light btn-sm" href="/admin/login">Login</a>
        </div>
      </div>
    </nav>
    <main class="container mt-5">
      <div class="row mb-4">
        <div class="col-12">
          <div class="card shadow-sm">
            <div class="card-body">
              <h1 class="card-title">Admin Dashboard</h1>
              <p class="card-text">Manage uploaded objects and review scan results.</p>
            </div>
          </div>
        </div>
      </div>
      <div id="unauthorized" class="alert alert-warning d-none">
        You must be logged in to view admin data. <a href="/admin/login">Sign in</a>.
      </div>
      <div id="dashboard" class="d-none">
        <div class="row mb-3">
          <div class="col-12">
            <div class="alert alert-info" id="dashboardMessage">Loading objects...</div>
          </div>
        </div>
        <div class="row">
          <div class="col-12">
            <div class="table-responsive">
              <table class="table table-striped">
                <thead>
                  <tr>
                    <th>ID</th>
                    <th>Filename</th>
                    <th>Type</th>
                    <th>Size</th>
                    <th>Scan Result</th>
                    <th>Created</th>
                    <th>Actions</th>
                  </tr>
                </thead>
                <tbody id="objectsBody"></tbody>
              </table>
            </div>
          </div>
        </div>
      </div>
    </main>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script>
      const token = localStorage.getItem('projectplutonium_admin_token');
      const dashboard = document.getElementById('dashboard');
      const unauthorized = document.getElementById('unauthorized');
      const message = document.getElementById('dashboardMessage');
      const objectsBody = document.getElementById('objectsBody');
      const logoutButton = document.getElementById('logoutButton');

      function renderUnauthorized() {
        unauthorized.classList.remove('d-none');
        dashboard.classList.add('d-none');
      }

      async function loadObjects() {
        if (!token) {
          renderUnauthorized();
          return;
        }
        dashboard.classList.remove('d-none');
        unauthorized.classList.add('d-none');
        try {
          const resp = await fetch('/admin/objects', {
            headers: { Authorization: `Bearer ${token}` },
          });
          if (resp.status === 401) {
            renderUnauthorized();
            return;
          }
          const objects = await resp.json();
          objectsBody.innerHTML = objects.map((obj) => `
            <tr>
              <td><code>${obj.id}</code></td>
              <td>${obj.filename}</td>
              <td>${obj.content_type || 'unknown'}</td>
              <td>${obj.content_size}</td>
              <td>${obj.scan_result}</td>
              <td>${new Date(obj.created_at).toLocaleString()}</td>
              <td><button class="btn btn-sm btn-danger" onclick="deleteObject('${obj.id}')">Delete</button></td>
            </tr>
          `).join('');
          message.textContent = `${objects.length} objects loaded.`;
        } catch (err) {
          message.textContent = 'Failed to load objects.';
        }
      }

      async function deleteObject(id) {
        if (!token) return;
        if (!confirm('Delete this object?')) return;
        try {
          const resp = await fetch(`/admin/objects/${id}`, {
            method: 'DELETE',
            headers: { Authorization: `Bearer ${token}` },
          });
          if (!resp.ok) throw new Error('Delete failed');
          await loadObjects();
        } catch (err) {
          alert('Unable to delete object.');
        }
      }

      logoutButton.addEventListener('click', () => {
        localStorage.removeItem('projectplutonium_admin_token');
        window.location.reload();
      });

      loadObjects();
    </script>
  </body>
</html>
