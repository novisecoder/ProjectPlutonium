apiVersion: v1
kind: Service
metadata:
  name: scanner
  namespace: projectplutonium-dev
spec:
  selector:
    app: projectplutonium-scanner
  ports:
    - name: http
      port: 8080
      targetPort: 8080
    - name: debug
      port: 5678
      targetPort: 5678
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: scanner
  namespace: projectplutonium-dev
spec:
  replicas: 1
  selector:
    matchLabels:
      app: projectplutonium-scanner
  template:
    metadata:
      labels:
        app: projectplutonium-scanner
    spec:
      containers:
        - name: scanner
          image: projectplutonium-scanner
          ports:
            - containerPort: 8080
              name: http
            - containerPort: 5678
              name: debug
          env:
            - name: DATABASE_HOST
              value: postgres
            - name: DATABASE_PORT
              value: "5432"
            - name: POSTGRES_DB
              valueFrom:
                secretKeyRef:
                  name: projectplutonium-secrets
                  key: POSTGRES_DB
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: projectplutonium-secrets
                  key: POSTGRES_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: projectplutonium-secrets
                  key: POSTGRES_PASSWORD
            - name: DEBUGPY_ENABLED
              value: "true"
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 20
            timeoutSeconds: 5
          resources:
            limits:
              cpu: 500m
              memory: 512Mi
            requests:
              cpu: 250m
              memory: 256Mi
